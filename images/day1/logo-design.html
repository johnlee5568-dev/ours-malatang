<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { margin: 0; padding: 20px; background: #000; font-family: "Noto Sans JP", "Hiragino Kaku Gothic Pro", sans-serif; }
    .logo-container {
      width: 400px;
      height: 400px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid #c41e3a;
      position: relative;
    }
    .logo-content {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .chinese {
      font-size: 72px;
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 0 #c41e3a;
      letter-spacing: 8px;
    }
    .english {
      font-size: 28px;
      font-weight: 300;
      color: #c41e3a;
      letter-spacing: 4px;
    }
    .accent {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 12px;
      height: 12px;
      background: #c41e3a;
      border-radius: 50%;
    }
    /* Small square version for Instagram */
    .logo-small {
      width: 200px;
      height: 200px;
    }
    .logo-small .chinese { font-size: 48px; }
    .logo-small .english { font-size: 18px; }
  </style>
</head>
<body>
  <h2 style="color:#fff; margin-bottom:20px;">Logo设计 (400x400)</h2>
  <div class="logo-container">
    <div class="logo-content">
      <span class="chinese">麻辣湯</span>
      <span class="english">OURS</span>
    </div>
    <div class="accent"></div>
  </div>
  
  <h2 style="color:#fff; margin:40px 0 20px;">Instagram头像版 (200x200)</h2>
  <div class="logo-container logo-small">
    <div class="logo-content">
      <span class="chinese">麻辣湯</span>
      <span class="english">OURS</span>
    </div>
    <div class="accent"></div>
  </div>
</body>
</html>
