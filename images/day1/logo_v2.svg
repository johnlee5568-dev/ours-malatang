<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#000"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#c41e3a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  
  <!-- Decorative border -->
  <rect x="15" y="15" width="370" height="370" fill="none" stroke="url(#red)" stroke-width="2" opacity="0.6"/>
  <rect x="25" y="25" width="350" height="350" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>
  
  <!-- Chinese text with shadow -->
  <text x="200" y="200" font-family="'Noto Serif JP', serif" font-size="80" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="12">麻辣</text>
  <text x="200" y="270" font-family="'Noto Serif JP', serif" font-size="80" font-weight="bold" fill="url(#red)" text-anchor="middle" letter-spacing="12">湯</text>
  
  <!-- English text -->
  <text x="200" y="330" font-family="Georgia, serif" font-size="24" fill="#fff" text-anchor="middle" letter-spacing="8" opacity="0.9">OURS</text>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="50" r="3" fill="url(#red)"/>
  <circle cx="200" cy="350" r="3" fill="url(#red)"/>
  <circle cx="50" cy="200" r="3" fill="url(#red)"/>
  <circle cx="350" cy="200" r="3" fill="url(#red)"/>
</svg>
