<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" fill="url(#bg)"/>
  <rect x="30" y="30" width="340" height="340" fill="none" stroke="#c41e3a" stroke-width="2"/>
  
  <!-- OURS in circle -->
  <circle cx="200" cy="130" r="55" fill="none" stroke="#c41e3a" stroke-width="4"/>
  <text x="200" y="145" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">OURS</text>
  
  <!-- 麻辣湯 - using path for guaranteed rendering -->
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#fff" text-anchor="middle">麻辣湯</text>
  
  <!-- MALA TANG -->
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="16" fill="#c41e3a" text-anchor="middle" letter-spacing="6">MALA TANG</text>
  
  <circle cx="80" cy="250" r="4" fill="#c41e3a"/>
  <circle cx="320" cy="250" r="4" fill="#c41e3a"/>
</svg>
