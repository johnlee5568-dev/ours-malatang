<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#c41e3a"/>
    </linearGradient>
  </defs>
  
  <!-- Black background -->
  <rect width="400" height="400" fill="#000"/>
  
  <!-- Red panda silhouette (simplified) -->
  <circle cx="120" cy="140" r="45" fill="url(#red)"/>
  <circle cx="90" cy="115" r="20" fill="#000"/>
  <circle cx="150" cy="115" r="20" fill="#000"/>
  <ellipse cx="120" cy="155" rx="25" ry="18" fill="#000"/>
  
  <!-- MALA TANG text -->
  <text x="240" y="145" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="4">MALA</text>
  <text x="240" y="195" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="4">TANG</text>
  
  <!-- Red accent line -->
  <line x1="100" y1="250" x2="300" y2="250" stroke="url(#red)" stroke-width="3"/>
  
  <!-- OURS -->
  <text x="200" y="310" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="8">OURS</text>
  
  <!-- 麻辣湯 -->
  <text x="200" y="365" font-family="'MS Mincho', serif" font-size="36" font-weight="bold" fill="url(#red)" text-anchor="middle" letter-spacing="4">麻辣湯</text>
</svg>
