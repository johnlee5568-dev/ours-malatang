<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  
  <!-- Red circle outline (like reference) -->
  <circle cx="200" cy="160" r="90" fill="none" stroke="#c41e3a" stroke-width="4"/>
  <circle cx="200" cy="160" r="82" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
  
  <!-- OURS in circle -->
  <text x="200" y="175" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="6">OURS</text>
  
  <!-- Red line below circle -->
  <line x1="80" y1="280" x2="320" y2="280" stroke="#c41e3a" stroke-width="2"/>
  
  <!-- 麻辣湯 below -->
  <text x="200" y="340" font-family="'MS Mincho', 'Hiragino Mincho ProN', serif" font-size="52" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="6">麻辣湯</text>
</svg>
